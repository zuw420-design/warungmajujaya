version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_warung
    restart: always
    environment:
      MYSQL_DATABASE: 'warung_maju'
      MYSQL_ROOT_PASSWORD: 'root_password_jaya'
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: